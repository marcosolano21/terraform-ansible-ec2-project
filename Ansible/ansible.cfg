# Main default configuration section for Ansible
[defaults]
inventory = inventory.ini   # Path to the inventory file containing target hosts and groups:
host_key_checking = False   # Disable SSH host key checking to prevent interactive confirmation prompts
remote_user = ubuntu        # Default remote user used to establish SSH connections on target EC2 instances
callbacks_enabled = timer, profile_tasks    # Enable callback plugins to display individual task execution times and total playbook duration
gathering = smart           # Smart fact gathering: reuses cached facts during the run to save execution time

# Configuration section for tuning SSH network connections and execution performance
[ssh_connection]
pipelining = True           # Execute commands directly in memory over SSH without transferring temporary script files
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no      # Pass custom SSH flags to reuse open connections (ControlMaster), keep sessions idle for 60s (ControlPersist), and skip host key verification