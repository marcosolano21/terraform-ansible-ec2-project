[defaults]
inventory = inventory.ini
host_key_checking = False  
remote_user = ubuntu
# Habilita un reporte de tiempo al final para ver qué tarea es la más lenta:
callbacks_enabled = timer, profile_tasks    

[ssh_connection]
# Evita subir archivos temporales y manda las instrucciones directo por la memoria:
pipelining = True
# Mantén la conexión SSH abierta por 60 segundos para reutilizarla entre tareas:
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no